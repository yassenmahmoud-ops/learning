<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Simple product management system with create, update, delete, and search features.">
  <title>Product Management System</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="crud" aria-label="Product management system">
    <div class="head">
      <h2>product manager</h2>
      <p>simple product management system</p>
    </div>

    <div class="inputs">
      <label class="sr-only" for="title">Title</label>
      <input type="text" placeholder="title" id="title" autocomplete="off">
      <div class="price">
        <label class="sr-only" for="price">Price</label>
        <input type="number" placeholder="price" id="price" min="0" step="0.01">
        <label class="sr-only" for="taxes">Taxes</label>
        <input type="number" placeholder="taxes" id="taxes" min="0" step="0.01">
        <label class="sr-only" for="ads">Ads</label>
        <input type="number" placeholder="ads" id="ads" min="0" step="0.01">
        <label class="sr-only" for="discount">Discount</label>
        <input type="number" placeholder="discount" id="discount" min="0" step="0.01">
        <small id="total"> </small>
      </div>
      <label class="sr-only" for="count">Count</label>
      <input type="number" placeholder="count" id="count" min="1" step="1">
      <label class="sr-only" for="category">Category</label>
      <input type="text" placeholder="category" id="category" autocomplete="off">
      <button id="submit" type="button">create</button>
      <button id="cancelEdit" class="secondary" type="button" hidden>cancel edit</button>
      <div id="message" class="message" role="status" aria-live="polite" aria-atomic="true"></div>

    </div>

    <div class="outputs">
      <div class="searchblock">
        <label class="sr-only" for="search">Search products</label>
        <input type="text" id="search" placeholder="search..." autocomplete="off">
        <div class="btnsearch">
          <button id="searchtitle" type="button">search by title</button>
          <button id="searchcategory" type="button">search by category</button>
        </div>
      </div>

      <div id="deleteAll"></div>

      <table>
        <thead>
          <tr>
            <th>id</th>
            <th>title</th>
            <th>price</th>
            <th>taxes</th>
            <th>ads</th>
            <th>discount</th>
            <th>total</th>
            <th>category</th>
            <th>update</th>
            <th>delete</th>
          </tr>
        </thead>

        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
  <script src="./js/script.js"></script>
</body>
</html>
