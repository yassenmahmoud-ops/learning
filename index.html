<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
      <div class="crud">
        <div class="head">
          <h2>crud</h2>
          <p>product management system</p>
        </div>
      
        <div class="inputs">
          <input type="text" placeholder="title" id="title">
          <div class="price">
            <input onkeyup="getTotal()" type="number" placeholder="price" id="price">
                <input onkeyup="getTotal()"  type="number" placeholder="taxes" id="taxes">
            <input onkeyup="getTotal()" type="number" placeholder="ads" id="ads">
            <input onkeyup="getTotal()" type="number" placeholder="discount" id="discount">
            <small id="total"> </small>
          </div>
          <input type="number" placeholder="count" id="count">
          <input type="text" placeholder="category" id="category">
          <button id="submit">create</button>

        </div>

        <div class="outputs">
            <div class="searchblock">
              <input  onkeyup="searchData(this.value) " type="text" id="search" placeholder="search...">
              <div class="btnsearch">
                <button  id="searchtitle" onclick="getSearchMood(this.id)">search by title</button>
                <button id="searchcategory" onclick="getSearchMood(this.id)">search by category</button>
              </div>
            </div>

              <div id="deleteAll"></div>

            <table>
              <thead>
                <tr>
                  <th>id</th>
                  <th>title</th>
                  <th>price</th>
                  <th>taxes</th>
                  <th>ads</th>
                  <th>discount</th>
                  <th>total</th>
                  <th>category</th>
                  <th>update</th>
                  <th>delete</th>
                </tr>
              </thead>

              
              <tbody id="tbody">
                
              </tbody>
            </table>
        </div>
      </div>
      <script src="./js/script.js"></script>
</body>
</html>
